<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="grade-api-base" content="https://be176-grade-api-e27uuf35nq-uc.a.run.app" />
    <meta name="google-client-id" content="197157893148-iemp9aa61o6suf7q49coeeqdsp93h24e.apps.googleusercontent.com" />
    <title>BE 176 Grade Check</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="public/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="lookup-panel" aria-labelledby="page-title">
        <div class="intro">
          <p class="course">BIOENGR 176</p>
          <h1 id="page-title">Grade Check</h1>
          <p class="subtitle">Sign in with your UCLA Google account to view your discussion scores.</p>
        </div>

        <form id="lookup-form" class="lookup-form" autocomplete="off">
          <label>UCLA Google Sign-In</label>
          <div id="google-signin-button" class="google-signin-button"></div>
          <p id="form-message" class="message" role="status" aria-live="polite"></p>
        </form>
      </section>

      <section id="result-panel" class="result-panel" hidden aria-labelledby="result-title">
        <div class="result-heading">
          <div>
            <p class="course">Your Results</p>
            <h2 id="result-title">Discussion Scores</h2>
          </div>
          <button id="clear-button" type="button" class="secondary-button">Clear</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">Assignment</th>
                <th scope="col">Score</th>
              </tr>
            </thead>
            <tbody id="result-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="public/app.js"></script>
  </body>
</html>
